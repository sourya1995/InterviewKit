<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DoorDash System Design</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #f5f4f0;
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  padding: 32px 24px 48px;
}

header {
  max-width: 1300px;
  margin: 0 auto 28px;
  display: flex;
  align-items: baseline;
  gap: 16px;
}
header h1 {
  font-size: 22px;
  font-weight: 700;
  color: #111;
  letter-spacing: -0.4px;
}
header span {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: #999;
  letter-spacing: 0.08em;
}

.canvas-wrap {
  max-width: 1300px;
  margin: 0 auto;
  background: #fff;
  border: 1px solid #e0ddd6;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,0,0,0.07);
  position: relative;
}

svg {
  display: block;
  width: 100%;
  height: auto;
}

/* Legend */
.legend {
  max-width: 1300px;
  margin: 16px auto 0;
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  padding: 0 4px;
}
.leg {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 12px;
  color: #555;
  font-family: 'DM Sans', sans-serif;
}
.leg-dot {
  width: 12px; height: 12px;
  border-radius: 3px;
  flex-shrink: 0;
}
.leg-line {
  width: 24px; height: 2px;
  flex-shrink: 0;
}
.leg-dash {
  width: 24px; height: 2px;
  background: repeating-linear-gradient(90deg,#aaa 0,#aaa 4px,transparent 4px,transparent 8px);
  flex-shrink: 0;
}
</style>
</head>
<body>
